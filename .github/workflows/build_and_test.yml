name: TTHSD Next — 跨平台构建与测试

on:
  push:
    branches: [main, develop]
    tags: ['v*', 'test_v*']
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  桌面平台构建 (Windows / Linux / macOS × AMD64 / ARM64)
  # ═══════════════════════════════════════════════════════════════
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tthsd.dll
            lib_name: tthsd.dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: tthsd_arm64.dll
            lib_name: tthsd.dll

          # ── Linux ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tthsd.so
            lib_name: libtthsd.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: tthsd_arm64.so
            lib_name: libtthsd.so
            cross: true

          # ── macOS ──
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tthsd.dylib
            lib_name: libtthsd.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tthsd_arm64.dylib
            lib_name: libtthsd.dylib

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact_name }} (${{ matrix.target }})

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: 🔧 安装 cross (ARM64 Linux 交叉编译)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: 🏗️ 编译 (原生)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: 🏗️ 编译 (交叉编译)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: 📋 重命名产物
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.lib_name }}"
          DST="${{ matrix.artifact_name }}"
          cp "$SRC" "$DST"
          echo "产物: $DST ($(du -h "$DST" | cut -f1))"

      - name: 📤 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  #  Android 构建 (arm64-v8a / armeabi-v7a / x86_64)
  # ═══════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest
    name: tthsd_android.so (Android)
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
            suffix: arm64
          - abi: armeabi-v7a
            target: armv7-linux-androideabi
            suffix: armv7
          - abi: x86_64
            target: x86_64-linux-android
            suffix: x86_64

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: 📱 安装 cargo-ndk
        run: cargo install cargo-ndk

      - name: 🏗️ 编译 Android 库
        run: |
          cargo ndk \
            --target ${{ matrix.abi }} \
            --platform 21 \
            build --release --features android

      - name: 📋 重命名产物
        run: |
          SRC="target/${{ matrix.target }}/release/libTTHSD.so"
          DST="tthsd_android_${{ matrix.suffix }}.so"
          cp "$SRC" "$DST"
          echo "产物: $DST ($(du -h "$DST" | cut -f1))"

      - name: 📤 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: tthsd_android_${{ matrix.suffix }}.so
          path: tthsd_android_${{ matrix.suffix }}.so
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  #  鸿蒙 HarmonyOS 构建 (ARM64 / x86_64)
  # ═══════════════════════════════════════════════════════════════
  build-harmony:
    runs-on: ubuntu-latest
    name: tthsd_harmony.so (HarmonyOS)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-ohos
            ohos_arch: arm64-v8a
            suffix: arm64
          - target: x86_64-unknown-linux-ohos
            ohos_arch: x86_64
            suffix: x86_64

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4


      - name: 🔧 安装系统依赖
        run: |
          sudo apt-get update && sudo apt-get install -y make ninja-build jq clang
          # boring-sys2 的 CMake 使用 --target=aarch64-linux-ohos，GCC 不支持，必须用 clang
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++ 100

      - name: 📥 手动下载 OpenHarmony SDK
        id: setup-ohos
        run: |
          SDK_VERSION="v5.0.3"
          SDK_DIR="$HOME/ohos-sdk"
          mkdir -p "$SDK_DIR" && cd "$SDK_DIR"

          echo "📥 从 GitHub mirror 下载 OHOS SDK $SDK_VERSION ..."
          gh release download "$SDK_VERSION" \
            --pattern 'ohos-sdk-windows_linux-public.tar.gz*' \
            --repo openharmony-rs/ohos-sdk

          # 合并分片文件（如果有）
          if ls ohos-sdk-windows_linux-public.tar.gz.a? 1>/dev/null 2>&1; then
            cat ohos-sdk-windows_linux-public.tar.gz.a? > ohos-sdk-windows_linux-public.tar.gz
            rm -f ohos-sdk-windows_linux-public.tar.gz.a?
          fi

          echo "📦 解压 SDK ..."
          tar -xf ohos-sdk-windows_linux-public.tar.gz
          rm -f ohos-sdk-windows_linux-public.tar.gz*

          # 自动探测 Linux SDK 目录 + 解压 native zip 包
          echo "🔍 探测 SDK 目录结构 ..."
          find "$SDK_DIR" -maxdepth 4 -type d | head -20

          # 找到 linux 目录（可能嵌套在 ohos-sdk/ 下）
          LINUX_DIR=$(find "$SDK_DIR" -maxdepth 3 -type d -name "linux" | head -1)
          if [ -z "$LINUX_DIR" ]; then
            echo "❌ 找不到 linux 目录"
            find "$SDK_DIR" -maxdepth 4 -type d | head -30
            exit 1
          fi
          echo "✅ LINUX_DIR=$LINUX_DIR"

          # 删除无用的 windows/ohos 目录节省空间
          rm -rf "$(dirname "$LINUX_DIR")/windows" "$(dirname "$LINUX_DIR")/ohos" 2>/dev/null || true

          # 解压 linux 目录下的所有 zip 包（native-linux-*.zip 等）
          if ls "$LINUX_DIR"/*.zip 1>/dev/null 2>&1; then
            echo "📦 解压 native zip 包 ..."
            for z in "$LINUX_DIR"/*.zip; do
              echo "  -> $(basename "$z")"
              unzip -qo "$z" -d "$LINUX_DIR"
              rm -f "$z"
            done
          fi

          # 再次探测 native 目录
          ls -la "$LINUX_DIR/" || true

          if [ -d "$LINUX_DIR/native" ]; then
            OHOS_NDK="$LINUX_DIR/native"
          else
            OHOS_NDK=$(find "$LINUX_DIR" -maxdepth 2 -type d -name "native" | head -1)
          fi

          if [ -z "$OHOS_NDK" ] || [ ! -d "$OHOS_NDK" ]; then
            echo "❌ 找不到 native 目录"
            find "$LINUX_DIR" -maxdepth 3 -type d | head -30
            exit 1
          fi

          echo "✅ OHOS_NDK_HOME=$OHOS_NDK"
          ls -la "$OHOS_NDK/build/cmake/" 2>/dev/null || echo "⚠️ cmake 目录不存在"
          ls -la "$OHOS_NDK/llvm/bin/" 2>/dev/null | head -5 || echo "⚠️ llvm/bin 目录不存在"

          echo "ohos-ndk-home=$OHOS_NDK" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🦀 安装 Rust nightly (OHOS 支持)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: 📦 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: harmony-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: 🏗️ 编译鸿蒙库
        env:
          OHOS_NDK_HOME: ${{ steps.setup-ohos.outputs.ohos-ndk-home }}
        run: |
          echo "OHOS_NDK_HOME=$OHOS_NDK_HOME"
          ls -la "$OHOS_NDK_HOME/build/cmake/" 2>/dev/null || echo "Listing NDK..."

          # 创建 clang wrapper 脚本
          NDK_LLVM="$OHOS_NDK_HOME/llvm"
          SYSROOT="$OHOS_NDK_HOME/sysroot"

          mkdir -p $HOME/.ohos-wrappers

          # aarch64 wrapper
          cat > $HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang.sh << WRAPPER
          #!/bin/bash
          exec "$NDK_LLVM/bin/clang" --target=aarch64-linux-ohos --sysroot="$SYSROOT" "\$@"
          WRAPPER
          chmod +x $HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang.sh

          # x86_64 wrapper
          cat > $HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang.sh << WRAPPER
          #!/bin/bash
          exec "$NDK_LLVM/bin/clang" --target=x86_64-linux-ohos --sysroot="$SYSROOT" "\$@"
          WRAPPER
          chmod +x $HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang.sh

          # C++ wrapper  
          cat > $HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang++.sh << WRAPPER
          #!/bin/bash
          exec "$NDK_LLVM/bin/clang++" --target=aarch64-linux-ohos --sysroot="$SYSROOT" "\$@"
          WRAPPER
          chmod +x $HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang++.sh

          cat > $HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang++.sh << WRAPPER
          #!/bin/bash
          exec "$NDK_LLVM/bin/clang++" --target=x86_64-linux-ohos --sysroot="$SYSROOT" "\$@"
          WRAPPER
          chmod +x $HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang++.sh

          # 配置 Cargo linker + ar（必须在同一个 section 内，不能 duplicate key）
          mkdir -p .cargo
          cat > .cargo/config.toml << CARGO_CFG
          [target.aarch64-unknown-linux-ohos]
          ar = "llvm-ar"
          linker = "$HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang.sh"

          [target.x86_64-unknown-linux-ohos]
          ar = "llvm-ar"
          linker = "$HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang.sh"
          CARGO_CFG

          # 设置 CC/CXX 环境变量（目标特定 + 全局）
          # boring-sys2 的 cmake 不走 cc crate 约定，直接用系统 cc/c++
          # 必须设全局 CC/CXX 指向 NDK clang（它自带 --target 支持）
          export CC="$NDK_LLVM/bin/clang"
          export CXX="$NDK_LLVM/bin/clang++"
          export CC_aarch64_unknown_linux_ohos="$HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang.sh"
          export CXX_aarch64_unknown_linux_ohos="$HOME/.ohos-wrappers/aarch64-unknown-linux-ohos-clang++.sh"
          export CC_x86_64_unknown_linux_ohos="$HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang.sh"
          export CXX_x86_64_unknown_linux_ohos="$HOME/.ohos-wrappers/x86_64-unknown-linux-ohos-clang++.sh"
          export AR_aarch64_unknown_linux_ohos="$NDK_LLVM/bin/llvm-ar"
          export AR_x86_64_unknown_linux_ohos="$NDK_LLVM/bin/llvm-ar"
          export RANLIB_aarch64_unknown_linux_ohos="$NDK_LLVM/bin/llvm-ranlib"
          export RANLIB_x86_64_unknown_linux_ohos="$NDK_LLVM/bin/llvm-ranlib"

          # 设置 CMAKE_TOOLCHAIN_FILE 给 aws-lc-sys
          export CMAKE_TOOLCHAIN_FILE_aarch64_unknown_linux_ohos="$OHOS_NDK_HOME/build/cmake/ohos.toolchain.cmake"
          export CMAKE_TOOLCHAIN_FILE_x86_64_unknown_linux_ohos="$OHOS_NDK_HOME/build/cmake/ohos.toolchain.cmake"

          # 添加 llvm/bin 到 PATH
          export PATH="$NDK_LLVM/bin:$PATH"

          cargo +nightly build --release --target ${{ matrix.target }}

      - name: 📋 重命名产物
        run: |
          SRC="target/${{ matrix.target }}/release/libtthsd.so"
          DST="tthsd_harmony_${{ matrix.suffix }}.so"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "产物: $DST ($(du -h "$DST" | cut -f1))"
          else
            echo "⚠️  鸿蒙产物未生成"
            exit 1
          fi

      - name: 📤 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: tthsd_harmony_${{ matrix.suffix }}.so
          path: tthsd_harmony_${{ matrix.suffix }}.so
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  #  测试 (Linux + macOS + Windows 原生)
  # ═══════════════════════════════════════════════════════════════
  test:
    needs: build-desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tthsd.so
            lib_env: LD_LIBRARY_PATH
          - os: macos-latest
            artifact: tthsd_arm64.dylib
            lib_env: DYLD_LIBRARY_PATH
          - os: windows-latest
            artifact: tthsd.dll
            lib_env: PATH
    runs-on: ${{ matrix.os }}
    name: 测试 (${{ matrix.os }})

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: .

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🧪 运行基础加载测试
        shell: bash
        run: |
          echo "验证动态库可被加载..."
          python3 -c "
          import ctypes, sys, os
          lib_name = '${{ matrix.artifact }}'
          try:
              lib = ctypes.CDLL('./' + lib_name)
              print(f'[SUCCESS] Load {lib_name}')
              sys.exit(0)
          except Exception as e:
              print(f'[FAILED] error: {e}')
              sys.exit(1)
          "

  # ═══════════════════════════════════════════════════════════════
  #  发布 Release (仅在 tag 推送时触发)
  # ═══════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-desktop, build-android, test]
    runs-on: ubuntu-latest
    name: 📦 发布 Release
    permissions:
      contents: write

    steps:
      - name: 📥 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📦 打包为 7z
        run: |
          sudo apt-get install -y p7zip-full
          mkdir -p release_pkg

          # 桌面平台
          cp artifacts/tthsd.so/tthsd.so release_pkg/ 2>/dev/null || true
          cp artifacts/tthsd_arm64.so/tthsd_arm64.so release_pkg/ 2>/dev/null || true
          cp artifacts/tthsd.dll/tthsd.dll release_pkg/ 2>/dev/null || true
          cp artifacts/tthsd_arm64.dll/tthsd_arm64.dll release_pkg/ 2>/dev/null || true
          cp artifacts/tthsd.dylib/tthsd.dylib release_pkg/ 2>/dev/null || true
          cp artifacts/tthsd_arm64.dylib/tthsd_arm64.dylib release_pkg/ 2>/dev/null || true

          # Android
          mkdir -p release_pkg/android
          cp artifacts/tthsd_android_arm64.so/tthsd_android_arm64.so release_pkg/android/ 2>/dev/null || true
          cp artifacts/tthsd_android_armv7.so/tthsd_android_armv7.so release_pkg/android/ 2>/dev/null || true
          cp artifacts/tthsd_android_x86_64.so/tthsd_android_x86_64.so release_pkg/android/ 2>/dev/null || true

          # 鸿蒙
          mkdir -p release_pkg/harmony
          cp artifacts/tthsd_harmony_arm64.so/tthsd_harmony_arm64.so release_pkg/harmony/ 2>/dev/null || true
          cp artifacts/tthsd_harmony_x86_64.so/tthsd_harmony_x86_64.so release_pkg/harmony/ 2>/dev/null || true

          ls -lhR release_pkg/

          cd release_pkg
          7z a -t7z -m0=lzma2 -mx=9 ../TTHSD-${{ github.ref_name }}.7z *

      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TTHSD-${{ github.ref_name }}.7z
          generate_release_notes: true
